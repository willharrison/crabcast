name: Dev Build

on:
  push:
    branches: [develop]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx electron-forge make --arch=arm64
        env:
          VITE_BUILD_CHANNEL: dev

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: crabcast-dev-darwin-arm64
          path: out/make/**/*

      - name: Create dev pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: CrabCast Dev Build
          body: |
            Latest dev build from `develop` branch.

            **macOS** `.dmg` or `.zip` (arm64)

            This is a pre-release — expect bugs.
          files: out/make/**/*
          draft: false
          prerelease: true
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
